    <!-- Audio Effects using Web Audio API -->
    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);

                if (type === 'skid') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(220, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(60, audioCtx.currentTime + 0.3);
                    gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.3);
                } else if (type === 'crash') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(120, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(15, audioCtx.currentTime + 0.5);
                    gain.gain.setValueAtTime(0.35, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.6);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.6);
                } else if (type === 'coin') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(659.25, audioCtx.currentTime); // E5
                    osc.frequency.setValueAtTime(987.77, audioCtx.currentTime + 0.08); // B5
                    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.2);
                } else if (type === 'fever') {
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(1500, audioCtx.currentTime + 0.6);
                    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.6);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.6);
                } else if (type === 'move') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(250, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(500, audioCtx.currentTime + 0.12);
                    gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.12);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.12);
                }
            } catch (e) {
                console.log("Audio play error", e);
            }
        }
    </script>

    <!-- 3D Game Engine Script -->
    <script>
        const canvas = document.getElementById('gameCanvas');
        let scene, camera, renderer;
        
        // Game Constants
        const ROAD_WIDTH = 18;
        const ROAD_LENGTH = 1000;
        const LANES = [6, 0, -6]; // Left, Center, Right lane X-coordinates (Inverted to fix reverse control bug!)

        // Game State Variables
        let gameRunning = false;
        let score = 0;
        let distance = 0;
        let speed = 0.3; // Initial 3D scroll speed (Reduced from 0.5 to make it playable)
        const baseSpeed = 0.3; // Reduced from 0.5
        const maxSpeed = 1.0; // Reduced from 1.8
        let hp = 100;
        let fever = 0;
        let isFeverMode = false;
        let feverTimer = 0;

        let keys = { Left: false, Right: false, Skidding: false };

        // 3D Object Groupings
        let playerGroup; // Bike + Rider
        let roadPlanes = [];
        let roadLines = [];
        let entities = []; // Obstacles and items
        let particles = []; // Particle effects

        // Camera dragging angles
        let isMouseDown = false;
        let previousMousePosition = { x: 0, y: 0 };
        let cameraAngleYaw = 0;   // Left-Right rotation
        let cameraAnglePitch = 0.3; // Up-down elevation (initial angle)

        // UI references
        const scoreVal = document.getElementById('scoreVal');
        const highScoreVal = document.getElementById('highScoreVal');
        const hpBar = document.getElementById('hpBar');
        const feverBar = document.getElementById('feverBar');
        const startOverlay = document.getElementById('startOverlay');
        const gameOverOverlay = document.getElementById('gameOverOverlay');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const finalScore = document.getElementById('finalScore');
        const finalSpeed = document.getElementById('finalSpeed');

        let highScore = localStorage.getItem('fixie3d_highScore') || 0;
        highScoreVal.innerText = highScore;

        // Player configuration
        const playerState = {
            lane: 1, // Start in center lane
            x: 0,
            targetX: 0,
            z: 15, // Fixed distance from camera anchor
            wheelRotation: 0,
            frameLean: 0,
            shakeOffset: 0
        };

        // Initialize Three.js Scene
        function init3D() {
            // Scene Setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x060814);
            scene.fog = new THREE.FogExp2(0x060814, 0.012); // Cyberpunk fog

            // Camera Setup
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            // Renderer Setup
            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;

            // Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.35);
            scene.add(ambientLight);

            // Cyberpunk Neon Directional Light
            const dirLight = new THREE.DirectionalLight(0xf43f5e, 1.2);
            dirLight.position.set(20, 40, -50);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 1024;
            dirLight.shadow.mapSize.height = 1024;
            dirLight.shadow.camera.near = 0.5;
            dirLight.shadow.camera.far = 200;
            dirLight.shadow.camera.left = -20;
            dirLight.shadow.camera.right = 20;
            dirLight.shadow.camera.top = 20;
            dirLight.shadow.camera.bottom = -20;
            scene.add(dirLight);

            // Backlight (Cyan for neon contrast)
            const fillLight = new THREE.DirectionalLight(0x06b6d4, 0.8);
            fillLight.position.set(-20, 20, 50);
            scene.add(fillLight);

            // Build Environment
            createInfiniteRoad();
            createPlayerBike();

            // Setup Mouse Camera drag listeners
            setupCameraInteractions();
        }

        // Camera movement control implementation (As per 3D criteria)
        function setupCameraInteractions() {
            window.addEventListener('mousedown', (e) => {
                isMouseDown = true;
                previousMousePosition = { x: e.clientX, y: e.clientY };
            });

            window.addEventListener('mousemove', (e) => {
                if (!isMouseDown) return;
                const deltaX = e.clientX - previousMousePosition.x;
                const deltaY = e.clientY - previousMousePosition.y;

                cameraAngleYaw += deltaX * 0.005;
                cameraAnglePitch = Math.max(0.05, Math.min(Math.PI / 2.2, cameraAnglePitch + deltaY * 0.005));

                previousMousePosition = { x: e.clientX, y: e.clientY };
            });

            window.addEventListener('mouseup', () => { isMouseDown = false; });
            window.addEventListener('mouseleave', () => { isMouseDown = false; });

            // Mobile touch fallback for camera rotation
            window.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1) {
                    isMouseDown = true;
                    previousMousePosition = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                }
            }, { passive: true });

            window.addEventListener('touchmove', (e) => {
                if (!isMouseDown || e.touches.length !== 1) return;
                const deltaX = e.touches[0].clientX - previousMousePosition.x;
                const deltaY = e.touches[0].clientY - previousMousePosition.y;

                cameraAngleYaw += deltaX * 0.005;
                cameraAnglePitch = Math.max(0.05, Math.min(Math.PI / 2.2, cameraAnglePitch + deltaY * 0.005));

                previousMousePosition = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            }, { passive: true });

            window.addEventListener('touchend', () => { isMouseDown = false; });
        }

        // Infinite 3D Road geometry
        function createInfiniteRoad() {
            // Road Surface
            const roadGeo = new THREE.PlaneGeometry(ROAD_WIDTH, ROAD_LENGTH);
            const roadMat = new THREE.MeshStandardMaterial({ 
                color: 0x111622, 
                roughness: 0.8,
                metalness: 0.1
            });
            
            const road = new THREE.Mesh(roadGeo, roadMat);
            road.rotation.x = -Math.PI / 2;
            road.position.set(0, 0, ROAD_LENGTH / 2 - 50);
            road.receiveShadow = true;
            scene.add(road);
            roadPlanes.push(road);

            // Sidewalk edges
            const sidewalkGeo = new THREE.BoxGeometry(2, 0.4, ROAD_LENGTH);
            const sidewalkMat = new THREE.MeshStandardMaterial({ color: 0x272d3d, roughness: 0.6 });
            
            const leftSidewalk = new THREE.Mesh(sidewalkGeo, sidewalkMat);
            leftSidewalk.position.set(-ROAD_WIDTH/2 - 1, 0.2, ROAD_LENGTH/2 - 50);
            leftSidewalk.receiveShadow = true;
            scene.add(leftSidewalk);

            const rightSidewalk = new THREE.Mesh(sidewalkGeo, sidewalkMat);
            rightSidewalk.position.set(ROAD_WIDTH/2 + 1, 0.2, ROAD_LENGTH/2 - 50);
            rightSidewalk.receiveShadow = true;
            scene.add(rightSidewalk);

            // Lane separation markers (3D dashes)
            const markerGeo = new THREE.BoxGeometry(0.3, 0.02, 6);
            const markerMat = new THREE.MeshBasicMaterial({ color: 0xfbcfe8 }); // neon pink dashed lines

            for (let z = 0; z < ROAD_LENGTH; z += 18) {
                // Lane 1 divider
                const line1 = new THREE.Mesh(markerGeo, markerMat);
                line1.position.set(-3, 0.01, z);
                scene.add(line1);
                roadLines.push(line1);

                // Lane 2 divider
                const line2 = new THREE.Mesh(markerGeo, markerMat);
                line2.position.set(3, 0.01, z);
                scene.add(line2);
                roadLines.push(line2);
            }
        }

        // Beautiful Procedural 3D Bicycle & Rider Mesh Builder
        let rearWheelMesh, frontWheelFork, frameMesh;
        function createPlayerBike() {
            playerGroup = new THREE.Group();

            // Materials
            const steelMat = new THREE.MeshStandardMaterial({ color: 0xf43f5e, metalness: 0.9, roughness: 0.1 }); // Pink Neon Metal Frame
            const tireMat = new THREE.MeshStandardMaterial({ color: 0x1f2937, roughness: 0.9 });
            const neonMat = new THREE.MeshBasicMaterial({ color: 0x00f3ff });

            // 1. Wheels (Cylinders)
            const wheelGeo = new THREE.CylinderGeometry(0.9, 0.9, 0.18, 16);
            wheelGeo.rotateZ(Math.PI / 2);

            rearWheelMesh = new THREE.Mesh(wheelGeo, tireMat);
            rearWheelMesh.position.set(0, 0.9, -1.5);
            rearWheelMesh.castShadow = true;
            playerGroup.add(rearWheelMesh);

            // Wheel hub visualizer
            const spokeGeo = new THREE.BoxGeometry(0.08, 1.7, 0.08);
            const spoke = new THREE.Mesh(spokeGeo, steelMat);
            rearWheelMesh.add(spoke);

            const frontWheelMesh = new THREE.Mesh(wheelGeo, tireMat);
            frontWheelMesh.position.set(0, 0.9, 1.5);
            frontWheelMesh.castShadow = true;
            
            const frontSpoke = new THREE.Mesh(spokeGeo, steelMat);
            frontWheelMesh.add(frontSpoke);

            // 2. Front Fork & Handlebars
            frontWheelFork = new THREE.Group();
            frontWheelFork.position.set(0, 0, 1.5); // Pivot at front wheel
            
            // Fork tubes
            const forkTubeGeo = new THREE.CylinderGeometry(0.06, 0.06, 1.6);
            const leftFork = new THREE.Mesh(forkTubeGeo, steelMat);
            leftFork.position.set(-0.12, 0.8, 0);
            leftFork.rotation.x = -0.15;
            frontWheelFork.add(leftFork);

            const rightFork = leftFork.clone();
            rightFork.position.x = 0.12;
            frontWheelFork.add(rightFork);

            // Handlebar bar
            const barGeo = new THREE.CylinderGeometry(0.05, 0.05, 1.3);
            barGeo.rotateZ(Math.PI / 2);
            const handlebar = new THREE.Mesh(barGeo, steelMat);
            handlebar.position.set(0, 1.6, -0.1);
            frontWheelFork.add(handlebar);

            frontWheelFork.add(frontWheelMesh); // Nest wheel inside turning fork
            playerGroup.add(frontWheelFork);

            // 3. Frame Tubes
            frameMesh = new THREE.Group();
            
            // Bottom tube
            const tubeGeo1 = new THREE.CylinderGeometry(0.06, 0.06, 1.8);
            tubeGeo1.rotateX(Math.PI / 4);
            const bottomTube = new THREE.Mesh(tubeGeo1, steelMat);
            bottomTube.position.set(0, 1.1, -0.25);
            frameMesh.add(bottomTube);

            // Seat tube
            const tubeGeo2 = new THREE.CylinderGeometry(0.06, 0.06, 1.2);
            const seatTube = new THREE.Mesh(tubeGeo2, steelMat);
            seatTube.position.set(0, 1.4, -0.6);
            seatTube.rotation.x = 0.2;
            frameMesh.add(seatTube);

            // Top tube
            const tubeGeo3 = new THREE.CylinderGeometry(0.05, 0.05, 1.6);
            tubeGeo3.rotateZ(Math.PI / 2);
            const topTube = new THREE.Mesh(tubeGeo3, steelMat);
            topTube.position.set(0, 1.8, -0.1);
            topTube.rotation.x = 1.45;
            frameMesh.add(topTube);

            // Saddle (Seat)
            const saddleGeo = new THREE.BoxGeometry(0.25, 0.1, 0.5);
            const saddleMat = new THREE.MeshStandardMaterial({ color: 0x111827 });
            const saddle = new THREE.Mesh(saddleGeo, saddleMat);
            saddle.position.set(0, 1.95, -0.7);
            frameMesh.add(saddle);

            playerGroup.add(frameMesh);

            // 4. Low-Poly Rider Character representation
            const rider = new THREE.Group();
            rider.position.set(0, 1.8, -0.3);

            // Torso (jersey)
            const torsoGeo = new THREE.BoxGeometry(0.7, 0.9, 0.5);
            const jerseyMat = new THREE.MeshStandardMaterial({ color: 0xef4444, roughness: 0.5 });
            const torso = new THREE.Mesh(torsoGeo, jerseyMat);
            torso.position.set(0, 0.35, -0.1);
            torso.rotation.x = 0.5; // Lean forward aerodynamic pose
            rider.add(torso);

            // Helmet & Head
            const headGeo = new THREE.SphereGeometry(0.26, 12, 12);
            const skinMat = new THREE.MeshStandardMaterial({ color: 0xffdbac });
            const head = new THREE.Mesh(headGeo, skinMat);
            head.position.set(0, 0.85, 0.15);
            rider.add(head);

            const helmetGeo = new THREE.SphereGeometry(0.29, 12, 12, 0, Math.PI * 2, 0, Math.PI / 1.7);
            const helmetMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.3 });
            const helmet = new THREE.Mesh(helmetGeo, helmetMat);
            helmet.position.set(0, 0.9, 0.15);
            helmet.rotation.x = 0.3;
            rider.add(helmet);

            playerGroup.add(rider);

            // Position and add the whole bike package
            playerGroup.position.set(0, 0, playerState.z);
            scene.add(playerGroup);
        }

        // 3D Spawner Engine
        const ENTITY_TEMPLATES = {
            CAR: { type: 'car', color: 0x2563eb },
            CONE: { type: 'cone', color: 0xf97316 },
            HOLE: { type: 'hole', color: 0x05070e },
            DRINK: { type: 'drink', color: 0x22d3ee },
            COIN: { type: 'coin', color: 0xfacc15 }
        };

        let spawnTimer = 0;
        let spawnInterval = 90; // Frames between spawning obstacles (Increased from 65 to reduce difficulty)

        function spawn3DEntity() {
            const laneIndex = Math.floor(Math.random() * 3);
            const r = Math.random();
            let template;

            if (r < 0.45) {
                template = ENTITY_TEMPLATES.CAR;
            } else if (r < 0.70) {
                template = ENTITY_TEMPLATES.CONE;
            } else if (r < 0.80) {
                template = ENTITY_TEMPLATES.HOLE;
            } else if (r < 0.90) {
                template = ENTITY_TEMPLATES.COIN;
            } else {
                template = ENTITY_TEMPLATES.DRINK;
            }

            const x = LANES[laneIndex];
            const z = 220; // Spawn far away in 3D depth

            const entityGroup = new THREE.Group();
            entityGroup.position.set(x, 0, z);

            let mainMesh;

            if (template.type === 'car') {
                const carColors = [0xef4444, 0x3b82f6, 0x10b981, 0x8b5cf6, 0xf59e0b];
                const randColor = carColors[Math.floor(Math.random() * carColors.length)];
                const carMat = new THREE.MeshStandardMaterial({ color: randColor, metalness: 0.4, roughness: 0.3 });
                const windowMat = new THREE.MeshStandardMaterial({ color: 0x111827, roughness: 0.1 });

                // Car base body
                const carBaseGeo = new THREE.BoxGeometry(3.6, 1.8, 6.5);
                mainMesh = new THREE.Mesh(carBaseGeo, carMat);
                mainMesh.position.y = 1.0;
                mainMesh.castShadow = true;
                entityGroup.add(mainMesh);

                // Car Cabin upper
                const cabinGeo = new THREE.BoxGeometry(3.4, 1.1, 3.2);
                const cabin = new THREE.Mesh(cabinGeo, carMat);
                cabin.position.set(0, 1.9, -0.4);
                mainMesh.add(cabin);

                // Windshield
                const windshieldGeo = new THREE.BoxGeometry(3.1, 0.8, 0.1);
                const windshield = new THREE.Mesh(windshieldGeo, windowMat);
                windshield.position.set(0, 1.9, 1.25);
                windshield.rotation.x = -0.4;
                mainMesh.add(windshield);

            } else if (template.type === 'cone') {
                const coneMat = new THREE.MeshStandardMaterial({ color: template.color, roughness: 0.7 });
                const baseGeo = new THREE.BoxGeometry(1.6, 0.15, 1.6);
                mainMesh = new THREE.Mesh(baseGeo, coneMat);
                mainMesh.position.y = 0.08;
                mainMesh.castShadow = true;

                const tipGeo = new THREE.ConeGeometry(0.6, 1.9, 8);
                const tip = new THREE.Mesh(tipGeo, coneMat);
                tip.position.y = 0.95;
                mainMesh.add(tip);

                entityGroup.add(mainMesh);

            } else if (template.type === 'hole') {
                const holeMat = new THREE.MeshBasicMaterial({ color: template.color });
                const holeGeo = new THREE.RingGeometry(0.1, 1.8, 16);
                holeGeo.rotateX(-Math.PI / 2);
                mainMesh = new THREE.Mesh(holeGeo, holeMat);
                mainMesh.position.y = 0.015;
                entityGroup.add(mainMesh);

            } else if (template.type === 'drink') {
                const drinkMat = new THREE.MeshStandardMaterial({ color: template.color, metalness: 0.8, roughness: 0.2 });
                const canGeo = new THREE.CylinderGeometry(0.45, 0.45, 1.4, 12);
                mainMesh = new THREE.Mesh(canGeo, drinkMat);
                mainMesh.position.y = 0.7;
                mainMesh.castShadow = true;
                entityGroup.add(mainMesh);

                // Extra pulsing glow indicator
                const glowGeo = new THREE.SphereGeometry(0.7, 8, 8);
                const glowMat = new THREE.MeshBasicMaterial({ color: template.color, transparent: true, opacity: 0.15 });
                const glow = new THREE.Mesh(glowGeo, glowMat);
                glow.position.y = 0.7;
                entityGroup.add(glow);

            } else if (template.type === 'coin') {
                const coinMat = new THREE.MeshStandardMaterial({ color: template.color, metalness: 0.9, roughness: 0.1 });
                const coinGeo = new THREE.CylinderGeometry(0.65, 0.65, 0.15, 16);
                coinGeo.rotateX(Math.PI / 2);
                mainMesh = new THREE.Mesh(coinGeo, coinMat);
                mainMesh.position.y = 1.0;
                mainMesh.castShadow = true;
                entityGroup.add(mainMesh);
            }

            scene.add(entityGroup);

            entities.push({
                type: template.type,
                mesh: entityGroup,
                lane: laneIndex,
                y: 0,
                z: z,
                speedOffset: template.type === 'car' ? -0.15 : 0 // Cars move slightly with/against road
            });
        }

        // Particle System for skidding smoke and crash sparks
        function spawn3DParticle(x, y, z, color, speedY, size = 0.25) {
            const pGeo = new THREE.BoxGeometry(size, size, size);
            const pMat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 1 });
            const pMesh = new THREE.Mesh(pGeo, pMat);
            
            pMesh.position.set(x + (Math.random()-0.5)*0.5, y, z);
            scene.add(pMesh);

            particles.push({
                mesh: pMesh,
                vx: (Math.random() - 0.5) * 0.2,
                vy: speedY + Math.random() * 0.1,
                vz: -speed * 0.5, // matches road speed flow
                alpha: 1,
                decay: Math.random() * 0.05 + 0.03
            });
        }

        function create3DExplosion(x, y, z, color) {
            for (let i = 0; i < 20; i++) {
                spawn3DParticle(x, y, z, color, Math.random() * 0.3 + 0.1, 0.35);
            }
        }

        // Sound & collision actions trigger Game Over
        function triggerGameOver() {
            gameRunning = false;
            playSound('crash');
            create3DExplosion(playerState.x, 1, playerState.z, 0xff3b30);

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('fixie3d_highScore', highScore);
                highScoreVal.innerText = highScore;
            }

            finalScore.innerText = score;
            const displaySpeed = Math.floor(speed * 90);
            finalSpeed.innerText = `${displaySpeed} km/h`;

            gameOverOverlay.classList.remove('hidden');
        }

        // Game state initializer
        function startGame() {
            // Reset numerical stats
            score = 0;
            speed = baseSpeed;
            distance = 0;
            hp = 100;
            fever = 0;
            isFeverMode = false;

            // Clear legacy entities
            entities.forEach(ent => scene.remove(ent.mesh));
            entities = [];

            // Clear legacy particles
            particles.forEach(p => scene.remove(p.mesh));
            particles = [];

            // Reset player states
            playerState.lane = 1;
            playerState.x = 0;
            playerState.targetX = 0;
            playerGroup.position.set(0, 0, playerState.z);

            // Reset UI
            scoreVal.innerText = score;
            hpBar.style.width = '100%';
            feverBar.style.width = '0%';
            feverBar.classList.remove('animate-pulse');

            // Set running state
            gameRunning = true;

            // Animate overlay dismissal
            startOverlay.classList.add('opacity-0');
            setTimeout(() => {
                startOverlay.classList.add('hidden');
            }, 300);
            gameOverOverlay.classList.add('hidden');
        }

        // Keyboard Actions
        window.addEventListener('keydown', (e) => {
            if (!gameRunning) return;

            if (e.key === 'ArrowLeft') {
                if (playerState.lane > 0) {
                    playerState.lane--;
                    playerState.targetX = LANES[playerState.lane];
                    playSound('move');
                }
            } else if (e.key === 'ArrowRight') {
                if (playerState.lane < 2) {
                    playerState.lane++;
                    playerState.targetX = LANES[playerState.lane];
                    playSound('move');
                }
            } else if (e.key === 'ArrowDown' || e.key === ' ') {
                e.preventDefault();
                keys.Skidding = true;
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowDown' || e.key === ' ') {
                keys.Skidding = false;
            }
        });

        // Mobile Button Attachments
        const mobileLeft = document.getElementById('mobileLeft');
        const mobileRight = document.getElementById('mobileRight');
        const mobileSkid = document.getElementById('mobileSkid');

        mobileLeft.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameRunning && playerState.lane > 0) {
                playerState.lane--;
                playerState.targetX = LANES[playerState.lane];
                playSound('move');
            }
        }, { passive: false });

        mobileRight.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameRunning && playerState.lane < 2) {
                playerState.lane++;
                playerState.targetX = LANES[playerState.lane];
                playSound('move');
            }
        }, { passive: false });

        mobileSkid.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameRunning) keys.Skidding = true;
        }, { passive: false });

        mobileSkid.addEventListener('touchend', (e) => {
            e.preventDefault();
            keys.Skidding = false;
        }, { passive: false });

        // Bind start overlay buttons
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        // Resize callback
        function handleWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        window.addEventListener('resize', handleWindowResize);

        // Core Physics loop
        function updateGame() {
            if (!gameRunning) {
                // Slower scenic camera rotation when on start/end screens
                cameraAngleYaw += 0.003;
                return;
            }

            // 1. Move player bike smoothly on lateral lane lines
            const deltaX = playerState.targetX - playerState.x;
            playerState.x += deltaX * 0.15;
            playerGroup.position.x = playerState.x;

            // Frame lean effect on turn (Inverted sign to match inverted LANES coordinate)
            playerState.frameLean = deltaX * 0.08;
            playerGroup.rotation.z = playerState.frameLean;
            frontWheelFork.rotation.y = -deltaX * 0.05; // Slightly steer front wheel fork into lanes (Inverted)

            // Spin gears and wheels based on distance speed
            playerState.wheelRotation += speed * 0.5;
            rearWheelMesh.rotation.x = playerState.wheelRotation;

            // 2. Dynamic Speed / Skidding Brakes
            if (keys.Skidding) {
                if (speed > 0.15) {
                    speed -= 0.015;
                    if (speed < 0.15) speed = 0.15;
                }
                // Skid particle effects from rear wheel
                spawn3DParticle(playerState.x, 0.1, playerState.z - 1.5, 0xcccccc, 0.25, 0.18);
                if (Math.random() < 0.3) {
                    spawn3DParticle(playerState.x, 0.1, playerState.z - 1.5, 0xffa500, 0.3, 0.08); // Fire sparks
                }
                // Squeal sound
                if (Math.random() < 0.15) {
                    playSound('skid');
                }
                // Light chassis wobble representation
                playerState.shakeOffset = (Math.random() - 0.5) * 0.08;
                playerGroup.position.x += playerState.shakeOffset;
            } else {
                if (speed < maxSpeed && !isFeverMode) {
                    speed += 0.0002; // Gradual acceleration (Reduced from 0.0006)
                }
            }

            // 3. Track Fever State
            if (isFeverMode) {
                feverTimer--;
                fever = (feverTimer / 180) * 100;
                feverBar.style.width = `${fever}%`;

                // Fever Mode particles
                spawn3DParticle(playerState.x, 0.3, playerState.z + (Math.random() - 0.5) * 3, 0x22d3ee, 0.1, 0.2);

                if (feverTimer <= 0) {
                    isFeverMode = false;
                    feverBar.classList.remove('animate-pulse');
                    speed = baseSpeed + (score * 0.002);
                }
            }

            // 4. Moving the Infinite Road & Line separators
            distance += speed;
            roadLines.forEach(line => {
                line.position.z -= speed * 15; // move road components backwards to simulate forward progress
                if (line.position.z < -20) {
                    line.position.z += ROAD_LENGTH; // wrap around loop
                }
            });

            // 5. Spawn management
            spawnTimer++;
            if (spawnTimer >= spawnInterval) {
                spawn3DEntity();
                spawnTimer = 0;
                // Scale difficulty (More relaxed scale)
                spawnInterval = Math.max(40, 90 - Math.floor(score * 0.1));
            }

            // 6. Handle active 3D entities
            for (let i = entities.length - 1; i >= 0; i--) {
                const ent = entities[i];
                
                // Move entity back relative to speed
                ent.z -= (speed * 15 + ent.speedOffset);
                ent.mesh.position.z = ent.z;

                // Rotations
                if (ent.type === 'coin') {
                    ent.mesh.rotation.y += 0.05;
                }

                // Check distance for despawn
                if (ent.z < -20) {
                    scene.remove(ent.mesh);
                    entities.splice(i, 1);
                    if (ent.type === 'car' || ent.type === 'cone' || ent.type === 'hole') {
                        score += 10;
                        scoreVal.innerText = score;
                    }
                    continue;
                }

                // Collision Detection (2D projections inside X and Z plane)
                const distanceX = Math.abs(ent.mesh.position.x - playerState.x);
                const distanceZ = Math.abs(ent.mesh.position.z - playerState.z);

                if (distanceX < 2.2 && distanceZ < 3.2) {
                    // Collect items
                    if (ent.type === 'drink') {
                        playSound('coin');
                        fever = Math.min(100, fever + 35);
                        feverBar.style.width = `${fever}%`;
                        
                        scene.remove(ent.mesh);
                        entities.splice(i, 1);

                        if (fever >= 100 && !isFeverMode) {
                            isFeverMode = true;
                            feverTimer = 180;
                            playSound('fever');
                            speed = maxSpeed * 1.3;
                            feverBar.classList.add('animate-pulse');
                        }
                    } else if (ent.type === 'coin') {
                        playSound('coin');
                        score += 150;
                        scoreVal.innerText = score;
                        scene.remove(ent.mesh);
                        entities.splice(i, 1);
                    } else {
                        // Impact Obstacles
                        if (isFeverMode) {
                            // Deflect obstacle!
                            create3DExplosion(ent.mesh.position.x, 1, ent.mesh.position.z, 0x00f3ff);
                            playSound('crash');
                            scene.remove(ent.mesh);
                            entities.splice(i, 1);
                            score += 50;
                            scoreVal.innerText = score;
                        } else {
                            // Hit damage
                            hp -= 25;
                            hpBar.style.width = `${hp}%`;
                            create3DExplosion(ent.mesh.position.x, 1, ent.mesh.position.z, 0xff3b30);
                            playSound('crash');
                            scene.remove(ent.mesh);
                            entities.splice(i, 1);

                            // Instant recoil speed penalty
                            speed = Math.max(baseSpeed, speed - 0.4);

                            if (hp <= 0) {
                                triggerGameOver();
                            }
                        }
                    }
                }
            }

            // 7. Handle particles decay
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.mesh.position.x += p.vx;
                p.mesh.position.y += p.vy;
                p.mesh.position.z += p.vz;
                
                p.alpha -= p.decay;
                p.mesh.material.opacity = p.alpha;
                p.mesh.scale.setScalar(p.alpha);

                if (p.alpha <= 0) {
                    scene.remove(p.mesh);
                    particles.splice(i, 1);
                }
            }

            // Natural passive score gain
            if (Math.floor(distance) % 15 === 0) {
                score += 1;
                scoreVal.innerText = score;
            }
        }

        // Camera positioning logic
        function updateCamera() {
            // Spring return to normal back-chase camera if user released mouse
            if (!isMouseDown) {
                cameraAngleYaw += (0 - cameraAngleYaw) * 0.08;
                cameraAnglePitch += (0.28 - cameraAnglePitch) * 0.08;
            }

            // Spherical coordinate offset around the player bicycle
            const radius = 14; // Camera distance
            const offsetZ = -Math.cos(cameraAngleYaw) * Math.cos(cameraAnglePitch) * radius;
            const offsetX = -Math.sin(cameraAngleYaw) * Math.cos(cameraAnglePitch) * radius;
            const offsetY = Math.sin(cameraAnglePitch) * radius;

            // Apply camera coordinate positioning relative to bike
            camera.position.set(
                playerState.x + offsetX,
                1.4 + offsetY,
                playerState.z + offsetZ
            );

            // Keep lookAt focus centered right in front of the rider
            camera.lookAt(playerState.x, 1.2, playerState.z + 15);
        }

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);

            // Update game physics logic
            updateGame();

            // Handle Camera repositioning
            updateCamera();

            // Render Frame
            renderer.render(scene, camera);
        }

        // Run Engine on load (As per criteria: animation loop starts after window.onload event)
        window.onload = function() {
            init3D();
            animate();
        };
    </script>
</body>
</html>
