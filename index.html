<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fixie Drift - Gemini 3 Flash Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; touch-action: none; }
        canvas { display: block; }
        #ui {
            position: absolute;
            top: 30px; left: 30px;
            color: #fff; z-index: 10;
            pointer-events: none;
        }
        .nebula-text {
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.8), 0 0 20px rgba(0, 255, 204, 0.4);
        }
        #controls {
            position: absolute;
            bottom: 40px; left: 0; width: 100%;
            display: flex; justify-content: space-between; align-items: flex-end;
            padding: 0 40px; z-index: 50;
        }
        .ctrl-btn {
            width: 80px; height: 80px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(0, 255, 204, 0.5);
            border-radius: 20px;
            display: flex; justify-content: center; align-items: center;
            color: white; font-weight: bold; font-size: 24px;
            backdrop-filter: blur(5px);
            cursor: pointer;
            user-select: none;
            transition: all 0.1s;
        }
        .ctrl-btn:active {
            background: rgba(0, 255, 204, 0.4);
            transform: scale(0.9);
        }
        #brake-btn {
            width: 120px; height: 60px;
            background: rgba(255, 50, 50, 0.2);
            border-color: rgba(255, 50, 50, 0.5);
            font-size: 16px;
        }
        #brake-btn.active {
            background: rgba(255, 50, 50, 0.6);
        }
        #overlay, #game-over-screen, #ai-chat-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 5, 10, 0.85);
            display: flex; justify-content: center; align-items: center;
            z-index: 100; color: white; text-align: center;
            backdrop-filter: blur(8px);
        }
        #game-over-screen, #ai-chat-screen { display: none; background: rgba(20, 0, 0, 0.9); }
        .menu-box {
            width: 90%; max-width: 500px;
            padding: 40px; border: 1px solid rgba(0, 255, 204, 0.3); border-radius: 30px;
            background: rgba(0, 20, 20, 0.6);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .btn-action {
            margin-top: 15px; padding: 15px 40px;
            background: #00ffcc; color: #000;
            border: none; border-radius: 12px;
            font-size: 18px; font-weight: 800; cursor: pointer;
        }
        .drift-notice {
            color: #ffcc00; font-weight: 900; font-size: 2em;
            margin-top: 10px; animation: pulse 0.2s infinite alternate;
            display: none;
        }
        #ai-feedback {
            font-size: 0.95rem; line-height: 1.6; color: #a0ffe0;
            margin: 20px 0; text-align: left; background: rgba(0,0,0,0.3);
            padding: 15px; border-radius: 15px; border-left: 4px solid #00ffcc;
            min-height: 80px;
        }
        @keyframes pulse { from { transform: scale(1); opacity: 0.8; } to { transform: scale(1.1); opacity: 1; } }
        
        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid #00ffcc;
            border-radius: 50%; width: 24px; height: 24px;
            animation: spin 1s linear infinite; display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="ui">
        <div class="stat text-sm opacity-60 font-bold tracking-widest uppercase">Distance</div>
        <div id="distance" class="text-4 font-black text-4xl mb-4">0</div>
        <div class="stat text-sm opacity-60 font-bold tracking-widest uppercase">Speed</div>
        <div id="speed" class="text-4xl font-black nebula-text">0</div>
        <div id="drift-status" class="drift-notice italic">SKIDDING!</div>
    </div>

    <div id="controls">
        <div class="ctrl-btn" id="left-btn" onmousedown="moveLaneVisual(-1)" ontouchstart="event.preventDefault(); moveLaneVisual(-1)">◀</div>
        <div class="ctrl-btn" id="brake-btn">SKID</div>
        <div class="ctrl-btn" id="right-btn" onmousedown="moveLaneVisual(1)" ontouchstart="event.preventDefault(); moveLaneVisual(1)">▶</div>
    </div>

    <div id="overlay">
        <div class="menu-box">
            <h1 class="text-5xl font-black italic tracking-tighter mb-4">FIXIE <span class="text-[#00ffcc]">DRIFT</span></h1>
            <p class="opacity-70 mb-8">POWERED BY GEMINI 3 FLASH</p>
            <button class="btn-action w-full" onclick="startGame()">START ENGINE</button>
            <button class="btn-action w-full mt-4 bg-transparent border-2 border-[#00ffcc] text-[#00ffcc]" onclick="showAICoach()">✨ AI COACH ADVICE</button>
        </div>
    </div>

    <div id="game-over-screen">
        <div class="menu-box">
            <h1 class="text-6xl font-black text-red-500 mb-2">WRECKED</h1>
            <p id="final-stats" class="text-2xl opacity-80 mb-4"></p>
            
            <div id="ai-feedback-container">
                <p class="text-xs font-bold text-[#00ffcc] uppercase tracking-widest">Gemini Analysis</p>
                <div id="ai-feedback"><div class="loader"></div> Calculating your street cred...</div>
            </div>

            <div class="flex flex-col gap-2">
                <button class="btn-action" onclick="location.reload()">TRY AGAIN</button>
            </div>
        </div>
    </div>

    <div id="ai-chat-screen">
        <div class="menu-box">
            <h1 class="text-3xl font-black mb-4 text-[#00ffcc]">✨ AI COACH</h1>
            <div id="ai-coach-text" class="text-sm text-left mb-6 leading-relaxed">전략을 구상 중입니다...</div>
            <button class="btn-action w-full" onclick="closeAICoach()">CLOSE</button>
        </div>
    </div>

    <script>
        const apiKey = ""; 
        const GEMINI_MODEL = "gemini-3-flash-preview";
        
        let scene, camera, renderer, clock;
        let bicycleGroup, road, roadTexture;
        let frontWheelMesh, backWheelMesh, frontWheelGroup;
        let obstacles = [];
        let driftMarks = [];
        
        let speed = 0;
        let distance = 0;
        let isGameRunning = false;
        let isDrifting = false;
        let driftCount = 0;
        
        const LANES = [-6, -3, 0, 3, 6]; 
        let currentLane = 2; 
        const maxForwardSpeed = 1.2;
        
        window.onload = init;

        // --- Gemini 2.5 Flash API Integration ---
        async function fetchGeminiAI(prompt, systemInstruction) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${apiKey}`;
            let retryCount = 0;
            const delays = [1000, 2000, 4000, 8000, 16000];

            while (retryCount < 5) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            systemInstruction: { parts: [{ text: systemInstruction }] }
                        })
                    });
                    
                    if (!response.ok) throw new Error("API call failed");
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "AI 분석에 실패했습니다.";
                } catch (error) {
                    retryCount++;
                    if (retryCount === 5) return "서버와 연결할 수 없습니다. 나중에 다시 시도해주세요.";
                    await new Promise(res => setTimeout(res, delays[retryCount - 1]));
                }
            }
        }

        async function getGameOverFeedback() {
            const systemPrompt = "너는 세계 최고의 스트릿 픽시 라이더야. 플레이어의 점수를 보고 아주 짧고 강렬한 한국어 피드백을 줘. 라이더 특유의 쿨한 말투(반말/존댓말 섞어서)를 사용해. '스키딩', '노브레이크' 같은 용어를 섞어. 그리고, 마지막에 꼭 이 게임은 버튼이 좌우 반전이라고 해.";
            const userPrompt = `게임 결과 - 주행 거리: ${Math.floor(distance)}m, 최대 속력: ${Math.floor(maxForwardSpeed * 150)}km/h, 스키딩 횟수: ${driftCount}회. 이 데이터를 바탕으로 한마디 해줘.`;
            
            const feedback = await fetchGeminiAI(userPrompt, systemPrompt);
            document.getElementById('ai-feedback').innerText = feedback;
        }

        async function showAICoach() {
            document.getElementById('ai-chat-screen').style.display = 'flex';
            document.getElementById('ai-coach-text').innerHTML = '<div class="loader"></div> Gemini 3이 전략을 분석 중...';
            
            const systemPrompt = "너는 픽시 바이크 코치야. 게임 시작 전 라이더에게 필요한 팁을 한국어로 한 문장만 짧고 굵게 말해줘. 기술적인 조언이나 정신 교육도 좋아.";
            const advice = await fetchGeminiAI("플레이어에게 기술적인 팁 하나만 줘.", systemPrompt);
            document.getElementById('ai-coach-text').innerText = advice;
        }

        function closeAICoach() {
            document.getElementById('ai-chat-screen').style.display = 'none';
        }

        // --- Core Game Engine ---
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020508);
            scene.fog = new THREE.Fog(0x020508, 20, 100);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);
            const pointLight = new THREE.PointLight(0x00ffcc, 2, 50);
            pointLight.position.set(0, 10, 0);
            scene.add(pointLight);

            createRoad();
            createBicycle();
            clock = new THREE.Clock();

            window.addEventListener('keydown', (e) => {
                if (!isGameRunning) return;
                const key = e.key.toLowerCase();
                if (key === 'a' || e.key === 'ArrowLeft') moveLaneVisual(-1);
                if (key === 'd' || e.key === 'ArrowRight') moveLaneVisual(1);
                if (e.code === 'Space') { if(!isDrifting) { isDrifting = true; driftCount++; } }
            });
            window.addEventListener('keyup', (e) => { if (e.code === 'Space') isDrifting = false; });

            const brakeBtn = document.getElementById('brake-btn');
            const startDrift = () => { if(!isDrifting) { isDrifting = true; driftCount++; } brakeBtn.classList.add('active'); };
            const stopDrift = () => { isDrifting = false; brakeBtn.classList.remove('active'); };

            brakeBtn.addEventListener('mousedown', startDrift);
            window.addEventListener('mouseup', stopDrift);
            brakeBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startDrift(); });
            window.addEventListener('touchend', stopDrift);

            window.addEventListener('resize', onWindowResize);
            renderLoop();
        }

        function moveLaneVisual(dir) {
            if (!isGameRunning) return;
            currentLane = Math.max(0, Math.min(4, currentLane + dir));
        }

        function createRoad() {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#050a0f';
            ctx.fillRect(0, 0, 512, 512);
            ctx.strokeStyle = 'rgba(0, 255, 204, 0.1)';
            ctx.lineWidth = 4;
            for(let i=1; i<5; i++) {
                const x = (512 / 5) * i;
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, 512); ctx.stroke();
            }
            roadTexture = new THREE.CanvasTexture(canvas);
            roadTexture.wrapS = roadTexture.wrapT = THREE.RepeatWrapping;
            roadTexture.repeat.set(1, 40);
            const roadGeo = new THREE.PlaneGeometry(18, 1000);
            const roadMat = new THREE.MeshStandardMaterial({ map: roadTexture, emissive: 0x00ffcc, emissiveIntensity: 0.05 });
            road = new THREE.Mesh(roadGeo, roadMat);
            road.rotation.x = -Math.PI / 2;
            scene.add(road);
        }

        function createBicycle() {
            bicycleGroup = new THREE.Group();
            const matMain = new THREE.MeshStandardMaterial({ color: 0x00ffcc, metalness: 0.8, roughness: 0.1 });
            const matBlack = new THREE.MeshStandardMaterial({ color: 0x050505 });
            const frame = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.08, 1.3), matMain);
            frame.position.y = 0.6;
            bicycleGroup.add(frame);
            const wheelGeo = new THREE.TorusGeometry(0.5, 0.05, 12, 32);
            backWheelMesh = new THREE.Group();
            const bTire = new THREE.Mesh(wheelGeo, matBlack);
            bTire.rotation.y = Math.PI / 2;
            backWheelMesh.add(bTire);
            backWheelMesh.position.set(0, 0.5, -0.65);
            bicycleGroup.add(backWheelMesh);
            frontWheelGroup = new THREE.Group();
            frontWheelGroup.position.set(0, 0.5, 0.65);
            frontWheelMesh = backWheelMesh.clone();
            frontWheelMesh.position.set(0, 0, 0);
            frontWheelGroup.add(frontWheelMesh);
            bicycleGroup.add(frontWheelGroup);
            scene.add(bicycleGroup);
            camera.position.set(0, 6, -10);
            camera.lookAt(0, 1, 5);
        }

        function spawnObstacle() {
            if (!isGameRunning) return;
            const laneIndex = Math.floor(Math.random() * 5);
            const geo = new THREE.BoxGeometry(2.2, 1.3, 2.2);
            const mat = new THREE.MeshStandardMaterial({ color: 0xff1166, emissive: 0xff1166, emissiveIntensity: 0.6 });
            const box = new THREE.Mesh(geo, mat);
            box.position.set(LANES[laneIndex], 0.65, 200);
            scene.add(box);
            obstacles.push(box);
        }

        function addDriftMark() {
            const markGeo = new THREE.PlaneGeometry(0.35, 1.4);
            const markMat = new THREE.MeshBasicMaterial({ color: 0x00ffcc, transparent: true, opacity: 0.5 });
            const mark = new THREE.Mesh(markGeo, markMat);
            mark.rotation.x = -Math.PI / 2;
            mark.position.set(bicycleGroup.position.x, 0.02, bicycleGroup.position.z - 0.85);
            scene.add(mark);
            driftMarks.push({ mesh: mark, life: 1.2 });
        }

        function startGame() {
            document.getElementById('overlay').style.display = 'none';
            isGameRunning = true;
            speed = 0.45;
            driftCount = 0;
            distance = 0;
            setInterval(() => { if(isGameRunning) spawnObstacle(); }, 1100);
        }

        function renderLoop() {
            requestAnimationFrame(renderLoop);
            const delta = Math.min(clock.getDelta(), 0.1);
            if (isGameRunning) updatePhysics(delta);
            renderer.render(scene, camera);
        }

        function updatePhysics(delta) {
            speed = Math.min(speed + 0.018 * delta, maxForwardSpeed);
            const moveSpeed = isDrifting ? speed * 0.55 : speed;
            distance += moveSpeed * 22 * delta;
            document.getElementById('drift-status').style.display = isDrifting ? 'block' : 'none';

            const targetX = LANES[currentLane];
            bicycleGroup.position.x = THREE.MathUtils.lerp(bicycleGroup.position.x, targetX, 0.14);
            const diffX = targetX - bicycleGroup.position.x;
            const tilt = -diffX * 0.22;
            bicycleGroup.rotation.z = THREE.MathUtils.lerp(bicycleGroup.rotation.z, tilt, 0.12);
            const driftAngle = isDrifting ? 0.38 : tilt * 0.65;
            bicycleGroup.rotation.y = THREE.MathUtils.lerp(bicycleGroup.rotation.y, driftAngle, 0.1);

            const rotDelta = moveSpeed * 38 * delta;
            frontWheelMesh.rotation.x += rotDelta;
            if(!isDrifting) backWheelMesh.rotation.x += rotDelta;
            const steerAngle = -diffX * 0.5;
            frontWheelGroup.rotation.y = THREE.MathUtils.lerp(frontWheelGroup.rotation.y, steerAngle, 0.2);

            roadTexture.offset.y -= moveSpeed * 5.5 * delta;
            if (isDrifting && speed > 0.1) addDriftMark();

            for(let i = driftMarks.length - 1; i >= 0; i--) {
                let m = driftMarks[i];
                m.life -= delta; m.mesh.material.opacity = m.life * 0.5;
                m.mesh.position.z -= moveSpeed * 22 * delta;
                if(m.life <= 0) { scene.remove(m.mesh); driftMarks.splice(i, 1); }
            }

            for(let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                obs.position.z -= moveSpeed * 42 * delta;
                if (obs.position.distanceTo(bicycleGroup.position) < 1.4) gameOver();
                if (obs.position.z < -20) { scene.remove(obs); obstacles.splice(i, 1); }
            }

            camera.position.x = THREE.MathUtils.lerp(camera.position.x, bicycleGroup.position.x * 0.45, 0.06);
            camera.lookAt(bicycleGroup.position.x * 0.2, 0.5, 10);
            document.getElementById('speed').innerText = Math.floor(moveSpeed * 155) + " KM/H";
            document.getElementById('distance').innerText = Math.floor(distance) + "m";
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function gameOver() {
            if (!isGameRunning) return;
            isGameRunning = false;
            document.getElementById('final-stats').innerText = `DISTANCE: ${Math.floor(distance)}m`;
            document.getElementById('game-over-screen').style.display = 'flex';
            getGameOverFeedback();
        }
    </script>
</body>
</html>
