<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 자전거 드리프트 - 바퀴 최적화</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #ui {
            position: absolute;
            top: 20px; left: 20px;
            color: #fff; z-index: 10;
            pointer-events: none;
        }
        .stat { font-size: 20px; font-weight: 800; text-transform: uppercase; }
        #speed { color: #00ffcc; font-size: 28px; }
        
        #overlay, #game-over-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex; justify-content: center; align-items: center;
            z-index: 100; color: white; text-align: center;
        }

        #game-over-screen {
            display: none;
            background: rgba(100, 0, 0, 0.7);
        }

        .menu-box {
            padding: 40px; border: 2px solid #00ffcc; border-radius: 20px;
            background: rgba(0, 15, 15, 0.95);
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.3);
            cursor: pointer;
        }

        .restart-btn {
            margin-top: 20px; padding: 12px 35px;
            background: #00ffcc; color: #000;
            border: none; border-radius: 8px;
            font-size: 20px; font-weight: bold; cursor: pointer;
        }

        .drift-notice {
            color: #ffcc00; font-weight: bold; font-size: 1.5em;
            margin-top: 10px; animation: blink 0.3s infinite alternate;
            display: none;
        }
        @keyframes blink { from { opacity: 0.4; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="ui">
        <div class="stat">SPEED: <span id="speed">0</span></div>
        <div class="stat">DISTANCE: <span id="distance">0</span> m</div>
        <div id="drift-status" class="drift-notice">DRIFT!</div>
    </div>

    <div id="overlay">
        <div class="menu-box" onclick="startGame()">
            <h1 style="color: #00ffcc; margin-top: 0;">FAST BICYCLE DRIFT</h1>
            <p>화면을 클릭하여 시작하세요</p>
            <p><b>A / D</b> : 빠른 조작 및 드리프트</p>
        </div>
    </div>

    <div id="game-over-screen">
        <div class="menu-box">
            <h1 style="color: #ff4444; font-size: 48px; margin: 0;">CRASHED!</h1>
            <p id="final-stats" style="font-size: 24px; margin: 20px 0;"></p>
            <button class="restart-btn" onclick="location.reload()">RETRY</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, clock;
        let bicycleGroup, road, roadTexture;
        let frontWheelMesh, backWheelMesh, frontWheelGroup;
        let obstacles = [];
        let driftMarks = [];
        
        let speed = 0;
        let distance = 0;
        let isGameRunning = false;
        let isDrifting = false;
        
        const keys = { a: false, d: false };
        const roadWidth = 14;
        const maxForwardSpeed = 1.0;
        const sideMoveSpeed = 35; 

        window.onload = init;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020205);
            scene.fog = new THREE.Fog(0x020205, 25, 75);

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            
            const sunLight = new THREE.DirectionalLight(0x00ffcc, 1);
            sunLight.position.set(5, 15, 10);
            scene.add(sunLight);

            createRoad();
            createBicycle();
            
            clock = new THREE.Clock();

            window.addEventListener('keydown', (e) => toggleKey(e, true));
            window.addEventListener('keyup', (e) => toggleKey(e, false));
            window.addEventListener('resize', onWindowResize);

            renderLoop();
        }

        function createRoad() {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, 256, 256);
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 2;
            ctx.strokeRect(0, 0, 256, 256);
            
            roadTexture = new THREE.CanvasTexture(canvas);
            roadTexture.wrapS = roadTexture.wrapT = THREE.RepeatWrapping;
            roadTexture.repeat.set(1, 30);

            const roadGeo = new THREE.PlaneGeometry(roadWidth, 800);
            const roadMat = new THREE.MeshStandardMaterial({ map: roadTexture });
            road = new THREE.Mesh(roadGeo, roadMat);
            road.rotation.x = -Math.PI / 2;
            scene.add(road);
        }

        function createBicycle() {
            bicycleGroup = new THREE.Group();

            const matMain = new THREE.MeshStandardMaterial({ color: 0x00ffcc, metalness: 0.6, roughness: 0.2 });
            const matBlack = new THREE.MeshStandardMaterial({ color: 0x111111 });

            // 1. 몸체 프레임
            const frame = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 1.2), matMain);
            frame.position.y = 0.5;
            bicycleGroup.add(frame);

            const seat = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.05, 0.3), matBlack);
            seat.position.set(0, 0.6, 0.3);
            bicycleGroup.add(seat);

            // 2. 바퀴 지오메트리 (바퀴 살 구분을 위해 Torus 사용)
            const wheelGeo = new THREE.TorusGeometry(0.4, 0.05, 10, 24);
            
            // 뒷바퀴 (축 설정을 위해 Mesh 생성 후 회전 고정)
            backWheelMesh = new THREE.Mesh(wheelGeo, matBlack);
            backWheelMesh.position.set(0, 0.4, 0.5);
            // 바퀴가 굴러가는 방향을 맞추기 위해 초기 회전 설정
            backWheelMesh.rotation.y = Math.PI / 2; 
            bicycleGroup.add(backWheelMesh);

            // 앞바퀴 그룹 (조향과 회전을 분리)
            frontWheelGroup = new THREE.Group();
            frontWheelGroup.position.set(0, 0.4, -0.5);
            
            frontWheelMesh = new THREE.Mesh(wheelGeo, matBlack);
            frontWheelMesh.rotation.y = Math.PI / 2;
            
            // 바퀴 회전이 잘 보이게 살(Spoke) 추가
            const spoke = new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.75, 0.02), matMain);
            frontWheelMesh.add(spoke);
            
            frontWheelGroup.add(frontWheelMesh);
            bicycleGroup.add(frontWheelGroup);

            // 3. 핸들
            const handle = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.7), matBlack);
            handle.rotation.z = Math.PI / 2;
            handle.position.y = 0.5; // frontWheelGroup 내 상대 좌표
            frontWheelGroup.add(handle);

            bicycleGroup.position.set(0, 0, 5);
            scene.add(bicycleGroup);
            
            camera.position.set(0, 3.5, 11);
            camera.lookAt(0, 1, 0);
        }

        function spawnObstacle() {
            if (!isGameRunning) return;
            const geo = new THREE.BoxGeometry(2, 0.8, 1);
            const mat = new THREE.MeshStandardMaterial({ color: 0xff3300, emissive: 0xaa0000 });
            const box = new THREE.Mesh(geo, mat);
            box.position.set((Math.random() - 0.5) * (roadWidth - 4), 0.4, -180);
            scene.add(box);
            obstacles.push(box);
        }

        function addDriftMark() {
            const markGeo = new THREE.PlaneGeometry(0.25, 1.0);
            const markMat = new THREE.MeshBasicMaterial({ color: 0x00ffcc, transparent: true, opacity: 0.2 });
            const mark = new THREE.Mesh(markGeo, markMat);
            mark.rotation.x = -Math.PI / 2;
            mark.position.set(bicycleGroup.position.x, 0.03, bicycleGroup.position.z + 0.6);
            scene.add(mark);
            driftMarks.push({ mesh: mark, life: 0.6 });
        }

        function toggleKey(e, isDown) {
            const key = e.key.toLowerCase();
            if (key === 'a' || e.key === 'ArrowLeft') keys.a = isDown;
            if (key === 'd' || e.key === 'ArrowRight') keys.d = isDown;
        }

        function startGame() {
            document.getElementById('overlay').style.display = 'none';
            isGameRunning = true;
            speed = 0.5;
            setInterval(() => { if(isGameRunning) spawnObstacle(); }, 800);
        }

        function renderLoop() {
            requestAnimationFrame(renderLoop);
            const delta = Math.min(clock.getDelta(), 0.1);

            if (isGameRunning) {
                updatePhysics(delta);
            } else if (speed > 0) {
                speed *= 0.96;
                roadTexture.offset.y += speed * 3 * delta;
            }

            renderer.render(scene, camera);
        }

        function updatePhysics(delta) {
            speed = Math.min(speed + 0.05 * delta, maxForwardSpeed);
            distance += speed * 30 * delta;

            let moveDir = 0;
            if (keys.a) moveDir = -1;
            if (keys.d) moveDir = 1;

            isDrifting = (moveDir !== 0 && speed > 0.4);
            document.getElementById('drift-status').style.display = isDrifting ? 'block' : 'none';

            // 1. 빠른 이동
            const targetPosX = bicycleGroup.position.x + (moveDir * sideMoveSpeed * delta);
            const clampedX = Math.max(-roadWidth/2 + 1.2, Math.min(roadWidth/2 - 1.2, targetPosX));
            bicycleGroup.position.x = THREE.MathUtils.lerp(bicycleGroup.position.x, clampedX, 0.4);

            // 2. 비주얼 기울기
            bicycleGroup.rotation.z = THREE.MathUtils.lerp(bicycleGroup.rotation.z, -moveDir * 0.5, 0.2);
            bicycleGroup.rotation.y = THREE.MathUtils.lerp(bicycleGroup.rotation.y, -moveDir * 0.15, 0.15);

            // 3. 바퀴 회전 핵심 (로컬 X축 기준 회전)
            const rotationAmount = speed * 25 * delta;
            backWheelMesh.rotation.x += rotationAmount; // 뒷바퀴 구름
            frontWheelMesh.rotation.x += rotationAmount; // 앞바퀴 구름

            // 4. 조향 (앞바퀴 핸들 꺾임)
            const targetSteer = -moveDir * 0.6;
            frontWheelGroup.rotation.y = THREE.MathUtils.lerp(frontWheelGroup.rotation.y, targetSteer, 0.2);

            roadTexture.offset.y += speed * 3 * delta;
            if (isDrifting) addDriftMark();

            // 드리프트 자국 및 장애물 처리
            driftMarks.forEach((m, i) => {
                m.life -= delta;
                m.mesh.material.opacity = m.life * 0.3;
                m.mesh.position.z += speed * 40 * delta;
                if (m.life <= 0) { scene.remove(m.mesh); driftMarks.splice(i, 1); }
            });

            obstacles.forEach((obs, i) => {
                obs.position.z += speed * 70 * delta;
                if (obs.position.distanceTo(bicycleGroup.position) < 1.4) { gameOver(); }
                if (obs.position.z > 20) { scene.remove(obs); obstacles.splice(i, 1); }
            });

            camera.position.x = THREE.MathUtils.lerp(camera.position.x, bicycleGroup.position.x * 0.7, 0.1);
            camera.lookAt(bicycleGroup.position.x * 0.5, 1, bicycleGroup.position.z - 5);

            document.getElementById('speed').innerText = (speed * 200).toFixed(0) + " KM/H";
            document.getElementById('distance').innerText = Math.floor(distance);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function gameOver() {
            if (!isGameRunning) return;
            isGameRunning = false;
            bicycleGroup.visible = false;
            document.getElementById('final-stats').innerText = `DISTANCE: ${Math.floor(distance)}m`;
            document.getElementById('game-over-screen').style.display = 'flex';
        }
    </script>
</body>
</html>
