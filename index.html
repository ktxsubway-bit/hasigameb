<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D 픽시 라이더 - 광택 & 그림자 에디션</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; touch-action: none; font-family: 'Inter', sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .interactive { pointer-events: auto; }
        
        /* 폰트 아웃라인 효과로 가독성 향상 */
        .text-outline {
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        }
    </style>
</head>
<body>

    <div id="ui-layer" class="flex flex-col justify-between p-4 z-10">
        <div class="flex justify-between items-start">
            <div class="text-white text-3xl font-bold text-outline" id="score-display">SCORE: 0</div>
            <div class="text-white text-sm opacity-80 text-right text-outline hidden md:block">
                [A/D] 또는 [방향키] 로 이동<br>화면 좌/우 터치로 이동
            </div>
        </div>
    </div>

    <div id="start-screen" class="absolute inset-0 flex flex-col items-center justify-center bg-black/70 z-20 backdrop-blur-sm interactive">
        <h1 class="text-5xl md:text-7xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-green-400 mb-2 italic transform -skew-x-12 drop-shadow-[0_5px_5px_rgba(0,0,0,0.8)]">FIXIE RIDER 3D</h1>
        <p class="text-white text-lg md:text-xl mb-8 font-medium">눈부신 광택의 픽시바이크로 도로를 질주하세요!</p>
        <button id="start-btn" class="px-10 py-5 bg-gradient-to-r from-cyan-400 to-green-400 text-slate-950 font-black rounded-full text-2xl hover:brightness-110 transition-transform transform hover:scale-105 active:scale-95 shadow-[0_0_30px_rgba(52,211,153,0.4)]">
            라이딩 시작
        </button>
    </div>

    <div id="game-over-screen" class="absolute inset-0 flex flex-col items-center justify-center bg-red-950/85 z-20 hidden backdrop-blur-md interactive">
        <h1 class="text-6xl md:text-7xl font-black text-white mb-2 shadow-black drop-shadow-2xl italic tracking-wider">CRASHED!</h1>
        <p class="text-white text-2xl mb-2">최종 점수: <span id="final-score" class="font-bold text-yellow-300">0</span></p>
        <p class="text-red-200 text-md mb-8">안전 장비를 꼭 착용합시다!</p>
        <button id="restart-btn" class="px-8 py-4 bg-yellow-400 text-slate-950 font-bold rounded-full text-xl hover:bg-yellow-300 transition-transform transform hover:scale-105 active:scale-95 shadow-lg">
            다시 달리기
        </button>
    </div>

    <script>
        let scene, camera, renderer;
        let playerGroup;
        let frontWheelMesh, backWheelMesh, crankGroup; // 움직임을 주기 위한 자전거 서브 그룹들
        let obstacles = [];
        let roadLines = [];
        let sceneryObjects = [];
        
        let isPlaying = false;
        let score = 0;
        let speed = 0.4; // 초기 속도
        const MAX_SPEED = 0.9;
        
        // 3차선 설정
        const LANE_WIDTH = 3.2;
        let currentLane = 1; // 0: 좌, 1: 중앙, 2: 우
        let targetX = 0;
        
        // HTML 요소
        const scoreDisplay = document.getElementById('score-display');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const finalScoreDisplay = document.getElementById('final-score');
        
        function init() {
            // 1. Scene 설정
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xb0e0e6); // 조금 더 맑은 파스텔 하늘색
            scene.fog = new THREE.FogExp2(0xb0e0e6, 0.02); // 한층 부드러운 안개 효과
            
            // 2. Camera 설정 (바이크 뒤쪽을 더 역동적으로 바라보도록 각도와 높이 수정)
            camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 150);
            camera.position.set(0, 3.2, 5.5);
            camera.lookAt(0, 0.8, -6);
            
            // 3. Renderer 설정 (그림자 기능 최고화질 최적화)
            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap; // 부드러운 그림자 경계선
            renderer.toneMapping = THREE.ACESFilmicToneMapping; // 실감나는 시네마틱 톤매핑
            renderer.toneMappingExposure = 1.1;
            document.body.appendChild(renderer.domElement);
            
            // 4. Lighting 설정 (강한 실시간 그림자와 고급 하이라이트 광택을 위한 태양광 배치)
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5); // 기본 부드러운 밝기
            scene.add(ambientLight);
            
            // 입체감을 더해주는 하늘-땅 반사광
            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.4);
            scene.add(hemiLight);

            // 주요 태양광 (그림자를 드리우고 크롬 표면 광택을 만드는 광원)
            const sunLight = new THREE.DirectionalLight(0xffffff, 1.2);
            sunLight.position.set(12, 20, 15);
            sunLight.castShadow = true;
            
            // 그림자 선명도 향상 세팅
            sunLight.shadow.mapSize.width = 2048;
            sunLight.shadow.mapSize.height = 2048;
            sunLight.shadow.camera.near = 0.5;
            sunLight.shadow.camera.far = 60;
            const shadowArea = 15;
            sunLight.shadow.camera.left = -shadowArea;
            sunLight.shadow.camera.right = shadowArea;
            sunLight.shadow.camera.top = shadowArea;
            sunLight.shadow.camera.bottom = -shadowArea;
            sunLight.shadow.bias = -0.0005; // 섀도우 아티팩트 방지
            scene.add(sunLight);

            createEnvironment();
            createPlayer();
            
            // 이벤트 리스너
            window.addEventListener('resize', onWindowResize);
            document.addEventListener('keydown', handleKeyDown);
            
            // 모바일 터치 처리 (화면 좌/우 터치로 차선 변경)
            document.addEventListener('touchstart', (e) => {
                if(!isPlaying) return;
                const touchX = e.touches[0].clientX;
                const screenWidth = window.innerWidth;
                if (touchX < screenWidth / 2) {
                    moveLeft();
                } else {
                    moveRight();
                }
            }, { passive: false });

            // 버튼 이벤트
            document.getElementById('start-btn').addEventListener('click', startGame);
            document.getElementById('restart-btn').addEventListener('click', startGame);

            // 대기화면 루프 시작
            animate();
        }

        function createEnvironment() {
            // 도로 (아스팔트 질감을 위해 어두운 톤과 거칠기 세팅)
            const roadGeometry = new THREE.PlaneGeometry(10, 200);
            const roadMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x1f2226, 
                roughness: 0.85, 
                metalness: 0.1 
            });
            const road = new THREE.Mesh(roadGeometry, roadMaterial);
            road.rotation.x = -Math.PI / 2;
            road.position.z = -90;
            road.receiveShadow = true;
            scene.add(road);

            // 잔디 (도로 양옆)
            const grassGeometry = new THREE.PlaneGeometry(120, 200);
            const grassMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x2e6f40, 
                roughness: 0.95 
            });
            const grass = new THREE.Mesh(grassGeometry, grassMaterial);
            grass.rotation.x = -Math.PI / 2;
            grass.position.y = -0.02;
            grass.position.z = -90;
            grass.receiveShadow = true;
            scene.add(grass);

            // 도로 경계선 (흰색 고체 선)
            const borderGeo = new THREE.PlaneGeometry(0.15, 200);
            const borderMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            
            const leftBorder = new THREE.Mesh(borderGeo, borderMat);
            leftBorder.rotation.x = -Math.PI / 2;
            leftBorder.position.set(-5, 0.01, -90);
            scene.add(leftBorder);

            const rightBorder = new THREE.Mesh(borderGeo, borderMat);
            rightBorder.rotation.x = -Math.PI / 2;
            rightBorder.position.set(5, 0.01, -90);
            scene.add(rightBorder);

            // 차선 (점선)
            const lineGeometry = new THREE.PlaneGeometry(0.12, 4);
            const lineMaterial = new THREE.MeshBasicMaterial({ color: 0xffea00 }); // 노란 중앙 점선
            
            for (let i = 0; i < 25; i++) {
                // 좌측 차선 분리선
                const line1 = new THREE.Mesh(lineGeometry, lineMaterial);
                line1.rotation.x = -Math.PI / 2;
                line1.position.set(-1.6, 0.02, -i * 8);
                scene.add(line1);
                roadLines.push(line1);

                // 우측 차선 분리선
                const line2 = new THREE.Mesh(lineGeometry, lineMaterial);
                line2.rotation.x = -Math.PI / 2;
                line2.position.set(1.6, 0.02, -i * 8);
                scene.add(line2);
                roadLines.push(line2);
            }

            // 가로수 및 풍경 장식 생성
            for(let i = 0; i < 40; i++) {
                createSceneryObject(true, -i * 4); // 왼쪽
                createSceneryObject(false, -i * 4); // 오른쪽
            }
        }

        function createSceneryObject(isLeft, zPos) {
            const isTree = Math.random() > 0.4;
            let mesh = new THREE.Group();
            
            if(isTree) {
                // 한층 더 예쁘고 입체적인 로우폴리 나무 생성
                const trunk = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.15, 0.22, 1.6, 6), 
                    new THREE.MeshStandardMaterial({color: 0x5c4033, roughness: 0.9})
                );
                trunk.position.y = 0.8;
                trunk.castShadow = true;
                trunk.receiveShadow = true;
                mesh.add(trunk);

                const leafColors = [0x1e5a2c, 0x2e7d32, 0x4caf50];
                const leaves = new THREE.Mesh(
                    new THREE.ConeGeometry(0.9, 2.2, 5), 
                    new THREE.MeshStandardMaterial({color: leafColors[Math.floor(Math.random()*3)], roughness: 0.8})
                );
                leaves.position.y = 2.2;
                leaves.castShadow = true;
                leaves.receiveShadow = true;
                mesh.add(leaves);
            } else {
                // 빌딩/상자 (원경의 가판대나 벽돌 느낌의 장애물)
                const height = Math.random() * 6 + 4;
                const blockMat = new THREE.MeshStandardMaterial({
                    color: new THREE.Color().setHSL(Math.random(), 0.5, 0.4),
                    roughness: 0.7,
                    metalness: 0.1
                });
                const block = new THREE.Mesh(new THREE.BoxGeometry(2, height, 2), blockMat);
                block.position.y = height / 2;
                block.castShadow = true;
                block.receiveShadow = true;
                mesh.add(block);
            }
            
            mesh.position.x = isLeft ? -(Math.random() * 12 + 6) : (Math.random() * 12 + 6);
            mesh.position.z = zPos;
            scene.add(mesh);
            sceneryObjects.push(mesh);
        }

        function createPlayer() {
            playerGroup = new THREE.Group();

            // 1. 고정밀 반사/광택 메탈릭 프레임 소재 정의
            const chromeMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x00f0ff, // 빛나는 네온 시안 블루
                metalness: 0.95, 
                roughness: 0.08, 
                envMapIntensity: 1.0 
            });
            
            const tireMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x1a1a1a, 
                roughness: 0.9, 
                metalness: 0.0 
            });
            
            const rimMaterial = new THREE.MeshStandardMaterial({ 
                color: 0xe0e0e0, 
                metalness: 0.9, 
                roughness: 0.1 
            });
            
            const blackMetalMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x111111, 
                metalness: 0.8, 
                roughness: 0.3 
            });
            
            const leatherMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x222222, 
                roughness: 0.7 
            });

            const riderSkinMat = new THREE.MeshStandardMaterial({ color: 0xffccaa, roughness: 0.6 });
            const riderClothesMat = new THREE.MeshStandardMaterial({ color: 0x2e3b4e, roughness: 0.5 });

            // ==========================================
            // [A] 뒷바퀴 모듈 (Upright YZ Plane정렬!)
            // ==========================================
            backWheelMesh = new THREE.Group();
            
            // 타이어
            const tireBack = new THREE.Mesh(new THREE.TorusGeometry(0.5, 0.05, 12, 36), tireMaterial);
            tireBack.castShadow = true;
            backWheelMesh.add(tireBack);
            
            // 림 (금속 테두리)
            const rimBack = new THREE.Mesh(new THREE.TorusGeometry(0.45, 0.02, 8, 36), rimMaterial);
            rimBack.castShadow = true;
            backWheelMesh.add(rimBack);
            
            // 바퀴 허브 센터 축
            const hubBack = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.15, 8), blackMetalMaterial);
            hubBack.rotation.x = Math.PI / 2;
            backWheelMesh.add(hubBack);

            // 바퀴 살 (스포크) 4개 교차 배치
            for(let k = 0; k < 6; k++) {
                const spoke = new THREE.Mesh(new THREE.CylinderGeometry(0.006, 0.006, 0.9, 4), rimMaterial);
                spoke.rotation.z = (Math.PI / 6) * k;
                backWheelMesh.add(spoke);
            }

            // 회전 전, 기본 YZ축 정렬을 위해 바퀴를 세움 (원래 XY평면에 생성된 토러스를 옆으로 90도 회전하여 똑바로 전방을 보게 함)
            backWheelMesh.rotation.y = Math.PI / 2;
            backWheelMesh.position.set(0, 0.55, 0.7);
            playerGroup.add(backWheelMesh);


            // ==========================================
            // [B] 앞바퀴 모듈 (동일하게 세움)
            // ==========================================
            frontWheelMesh = new THREE.Group();
            
            const tireFront = new THREE.Mesh(new THREE.TorusGeometry(0.5, 0.05, 12, 36), tireMaterial);
            tireFront.castShadow = true;
            frontWheelMesh.add(tireFront);
            
            const rimFront = new THREE.Mesh(new THREE.TorusGeometry(0.45, 0.02, 8, 36), rimMaterial);
            rimFront.castShadow = true;
            frontWheelMesh.add(rimFront);
            
            const hubFront = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.15, 8), blackMetalMaterial);
            hubFront.rotation.x = Math.PI / 2;
            frontWheelMesh.add(hubFront);

            for(let k = 0; k < 6; k++) {
                const spoke = new THREE.Mesh(new THREE.CylinderGeometry(0.006, 0.006, 0.9, 4), rimMaterial);
                spoke.rotation.z = (Math.PI / 6) * k;
                frontWheelMesh.add(spoke);
            }

            frontWheelMesh.rotation.y = Math.PI / 2;
            frontWheelMesh.position.set(0, 0.55, -0.7);
            playerGroup.add(frontWheelMesh);


            // ==========================================
            // [C] 픽시 자전거 크롬 프레임 (다이아몬드 구조화)
            // ==========================================
            const frameGroup = new THREE.Group();

            // 1. 시트 튜브 (안장으로 올라가는 주 파이프)
            const seatTube = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, 0.7), chromeMaterial);
            seatTube.rotation.x = 0.25; // 살짝 뒤로 기울어짐
            seatTube.position.set(0, 0.85, 0.2);
            frameGroup.add(seatTube);

            // 2. 탑 튜브 (수평 프레임)
            const topTube = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, 0.9), chromeMaterial);
            topTube.rotation.x = Math.PI / 2;
            topTube.position.set(0, 1.15, -0.22);
            frameGroup.add(topTube);

            // 3. 다운 튜브 (사선 하단 프레임)
            const downTube = new THREE.Mesh(new THREE.CylinderGeometry(0.028, 0.028, 1.05), chromeMaterial);
            downTube.rotation.x = -Math.PI / 3.6;
            downTube.position.set(0, 0.85, -0.2);
            frameGroup.add(downTube);

            // 4. 시트 스테이 (안장 아래에서 뒷바퀴 축으로 연결되는 얇은 한쌍의 뒤 포크)
            const seatStayL = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.015, 0.72), chromeMaterial);
            seatStayL.rotation.x = -Math.PI / 5;
            seatStayL.position.set(-0.06, 0.82, 0.45);
            frameGroup.add(seatStayL);

            const seatStayR = seatStayL.clone();
            seatStayR.position.x = 0.06;
            frameGroup.add(seatStayR);

            // 5. 체인 스테이 (비비축에서 뒷바퀴 축으로 연결되는 하단 지지대)
            const chainStayL = new THREE.Mesh(new THREE.CylinderGeometry(0.018, 0.018, 0.52), chromeMaterial);
            chainStayL.rotation.x = Math.PI / 2;
            chainStayL.position.set(-0.06, 0.55, 0.45);
            frameGroup.add(chainStayL);

            const chainStayR = chainStayL.clone();
            chainStayR.position.x = 0.06;
            frameGroup.add(chainStayR);

            // 6. 프론트 포크 (앞바퀴 제어 및 지지 포크)
            const forkL = new THREE.Mesh(new THREE.CylinderGeometry(0.018, 0.015, 0.7), chromeMaterial);
            forkL.rotation.x = 0.25; // 포크 각도
            forkL.position.set(-0.05, 0.82, -0.62);
            frameGroup.add(forkL);

            const forkR = forkL.clone();
            forkR.position.x = 0.05;
            frameGroup.add(forkR);

            // 7. 헤드 튜브 (탑튜브와 다운튜브가 모이는 조향관)
            const headTube = new THREE.Mesh(new THREE.CylinderGeometry(0.032, 0.032, 0.25), chromeMaterial);
            headTube.rotation.x = 0.25;
            headTube.position.set(0, 1.15, -0.65);
            frameGroup.add(headTube);

            // ==========================================
            // [D] 컴포넌트 장치 (안장, 핸들바, 페달)
            // ==========================================
            // 안장 포스트 & 피지크 에어로 안장 (Saddle)
            const seatPost = new THREE.Mesh(new THREE.CylinderGeometry(0.018, 0.018, 0.25), rimMaterial);
            seatPost.rotation.x = 0.25;
            seatPost.position.set(0, 1.25, 0.24);
            frameGroup.add(seatPost);

            const saddle = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.05, 0.35), leatherMaterial);
            saddle.position.set(0, 1.35, 0.23);
            saddle.rotation.x = 0.05; // 앞쪽을 아주 살짝 숙임
            frameGroup.add(saddle);

            // 핸들 스템 & 스포티 드롭바 (Handlebar)
            const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.018, 0.018, 0.12), rimMaterial);
            stem.rotation.x = Math.PI / 2.5;
            stem.position.set(0, 1.29, -0.68);
            frameGroup.add(stem);

            const handlebarCenter = new THREE.Mesh(new THREE.CylinderGeometry(0.018, 0.018, 0.35), blackMetalMaterial);
            handlebarCenter.rotation.z = Math.PI / 2;
            handlebarCenter.position.set(0, 1.32, -0.72);
            frameGroup.add(handlebarCenter);

            // 핸들바 끝 드롭 형태 (곡선 단순 묘사)
            const dropBarL = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.015, 0.18), blackMetalMaterial);
            dropBarL.rotation.x = Math.PI / 3;
            dropBarL.position.set(-0.165, 1.24, -0.78);
            frameGroup.add(dropBarL);

            const dropBarR = dropBarL.clone();
            dropBarR.position.x = 0.165;
            frameGroup.add(dropBarR);

            // 크랭크셋 & 페달 (Crankset) - 애니메이션에서 뱅글뱅글 돌아감
            crankGroup = new THREE.Group();
            crankGroup.position.set(0, 0.55, 0.17); // 바이크 하부 중심 (Bottom Bracket)
            
            const chainring = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.02, 16), blackMetalMaterial);
            chainring.rotation.z = Math.PI / 2;
            crankGroup.add(chainring);

            // 좌측 크랭크 암 & 페달
            const crankArmL = new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.2, 0.02), rimMaterial);
            crankArmL.position.set(-0.06, 0.09, 0);
            const pedalL = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.03, 0.12), blackMetalMaterial);
            pedalL.position.set(-0.08, 0.19, 0);
            crankGroup.add(crankArmL);
            crankGroup.add(pedalL);

            // 우측 크랭크 암 & 페달 (대칭 180도 반대 각도)
            const crankArmR = new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.2, 0.02), rimMaterial);
            crankArmR.position.set(0.06, -0.09, 0);
            const pedalR = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.03, 0.12), blackMetalMaterial);
            pedalR.position.set(0.08, -0.19, 0);
            crankGroup.add(crankArmR);
            crankGroup.add(pedalR);

            frameGroup.add(crankGroup);


            // ==========================================
            // [E] 스타일리시한 라이더 (Rider) - 자전거와 밀착된 자세
            // ==========================================
            const riderGroup = new THREE.Group();

            // 라이더 힙/몸뚱이 (숙이고 달리는 에어로 자세)
            const hips = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.35, 0.45), riderClothesMat);
            hips.position.set(0, 1.45, 0.1);
            hips.rotation.x = -0.5; // 강하게 앞으로 숙임
            riderGroup.add(hips);

            const spine = new THREE.Mesh(new THREE.BoxGeometry(0.32, 0.45, 0.32), riderClothesMat);
            spine.position.set(0, 1.62, -0.15);
            spine.rotation.x = -0.8; // 더 공격적으로 숙이기
            riderGroup.add(spine);

            // 팔 (드롭바 조준 연결)
            const armL = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.05, 0.5), riderClothesMat);
            armL.rotation.x = 0.5;
            armL.position.set(-0.16, 1.55, -0.42);
            riderGroup.add(armL);

            const armR = armL.clone();
            armR.position.x = 0.16;
            riderGroup.add(armR);

            // 헬멧을 쓴 머리
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.16, 12, 12), riderSkinMat);
            head.position.set(0, 1.82, -0.38);
            riderGroup.add(head);

            const helmet = new THREE.Mesh(new THREE.SphereGeometry(0.18, 12, 12, 0, Math.PI * 2, 0, Math.PI / 1.7), chromeMaterial); // 크롬 헬멧!
            helmet.position.set(0, 1.85, -0.35);
            helmet.rotation.x = -0.3;
            riderGroup.add(helmet);

            // 다리 (크랭크 회전축을 향하도록 단순 묘사)
            const legL = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.06, 0.65), riderClothesMat);
            legL.rotation.x = 0.4;
            legL.position.set(-0.16, 1.15, 0.05);
            riderGroup.add(legL);

            const legR = legL.clone();
            legR.position.x = 0.16;
            legR.rotation.x = 0.1;
            riderGroup.add(legR);

            frameGroup.add(riderGroup);

            // 모든 프레임 파트 그림자 셋팅
            frameGroup.traverse(child => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            playerGroup.add(frameGroup);

            // 플레이어 지상고 포지셔닝 조정 (휠 반경 0.55 + 마진)
            playerGroup.position.set(0, 0, 0);
            
            // 충돌 감지용 투명 박스 설정
            const hitBoxGeo = new THREE.BoxGeometry(0.8, 1.9, 1.9);
            const hitBoxMat = new THREE.MeshBasicMaterial({visible: false});
            const hitBox = new THREE.Mesh(hitBoxGeo, hitBoxMat);
            hitBox.position.y = 1.0;
            hitBox.name = "hitbox";
            playerGroup.add(hitBox);

            scene.add(playerGroup);
        }

        function spawnObstacle() {
            if(!isPlaying) return;

            // 장애물 (0: 스포츠카, 1: 대형트럭, 2: 라바콘)
            const type = Math.floor(Math.random() * 3);
            let mesh;
            
            // 도로 아스팔트 그림자에 어울리는 멋진 반사광 재질
            const carMaterial = new THREE.MeshStandardMaterial({
                color: new THREE.Color().setHSL(Math.random(), 0.9, 0.4),
                metalness: 0.8,
                roughness: 0.1
            });
            const windowMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.1, metalness: 0.9 });
            const coneMat = new THREE.MeshStandardMaterial({ color: 0xff3300, roughness: 0.5, emmissive: 0x220000 });

            if (type === 0) { // 스포츠카
                mesh = new THREE.Group();
                const body = new THREE.Mesh(new THREE.BoxGeometry(1.7, 0.65, 3.4), carMaterial);
                body.position.y = 0.4;
                const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.3, 0.5, 1.8), windowMat);
                cabin.position.set(0, 0.85, -0.2);
                mesh.add(body);
                mesh.add(cabin);
                mesh.userData = { width: 1.7, height: 1.1, depth: 3.4 };

            } else if (type === 1) { // 덤프트럭
                mesh = new THREE.Group();
                const cab = new THREE.Mesh(new THREE.BoxGeometry(2.0, 1.6, 1.4), new THREE.MeshStandardMaterial({color: 0xdddddd, metalness: 0.7, roughness: 0.2}));
                cab.position.set(0, 1.0, 1.6);
                const cargo = new THREE.Mesh(new THREE.BoxGeometry(2.2, 1.8, 3.8), new THREE.MeshStandardMaterial({color: 0x222222, metalness: 0.4, roughness: 0.5}));
                cargo.position.set(0, 1.1, -1.0);
                mesh.add(cab);
                mesh.add(cargo);
                mesh.userData = { width: 2.2, height: 2.1, depth: 5.2 };

            } else { // 고휘도 공사 라바콘 (Cone)
                mesh = new THREE.Group();
                const base = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.08, 0.6), new THREE.MeshStandardMaterial({color: 0x111111, roughness: 0.9}));
                base.position.y = 0.04;
                const cone = new THREE.Mesh(new THREE.ConeGeometry(0.22, 0.9, 16), coneMat);
                cone.position.y = 0.49;
                mesh.add(base);
                mesh.add(cone);
                mesh.userData = { width: 0.8, height: 1.0, depth: 0.8 };
            }

            // 모든 파트가 완벽한 그림자를 드리우도록 처리
            mesh.traverse(child => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            // 차선 랜덤 선택
            const lane = Math.floor(Math.random() * 3);
            const targetLaneX = (lane - 1) * LANE_WIDTH;
            
            mesh.position.set(targetLaneX, 0, -80); // 가시거리 밖에서 시작
            
            scene.add(mesh);
            obstacles.push(mesh);

            // 난이도 상승 곡선 (시간 및 스코어 연동형)
            let spawnDelay = Math.max(700, 1800 - (score * 12));
            setTimeout(spawnObstacle, spawnDelay);
        }

        function moveLeft() {
            if (currentLane > 0) {
                currentLane--;
                targetX = (currentLane - 1) * LANE_WIDTH;
            }
        }

        function moveRight() {
            if (currentLane < 2) {
                currentLane++;
                targetX = (currentLane - 1) * LANE_WIDTH;
            }
        }

        function handleKeyDown(event) {
            if (!isPlaying) return;
            if (event.key === 'ArrowLeft' || event.key === 'a' || event.key === 'A') {
                moveLeft();
            } else if (event.key === 'ArrowRight' || event.key === 'd' || event.key === 'D') {
                moveRight();
            }
        }

        function checkCollisions() {
            const pX = playerGroup.position.x;
            const pZ = playerGroup.position.z;
            const pW = 0.7; // 픽시 가로폭 최적 피격판정
            const pD = 1.7; // 자전거 길이

            for (let i = 0; i < obstacles.length; i++) {
                const obs = obstacles[i];
                const oX = obs.position.x;
                const oZ = obs.position.z;
                const oW = obs.userData.width;
                const oD = obs.userData.depth;

                // 정밀 AABB 컬리전 판정
                if (Math.abs(pX - oX) < (pW + oW) / 2 - 0.15 && 
                    Math.abs(pZ - oZ) < (pD + oD) / 2 - 0.15) {
                    gameOver();
                    return;
                }
            }
        }

        function startGame() {
            obstacles.forEach(obs => scene.remove(obs));
            obstacles = [];
            score = 0;
            speed = 0.45;
            currentLane = 1;
            targetX = 0;
            playerGroup.position.set(0, 0, 0);
            playerGroup.rotation.set(0, 0, 0);
            scoreDisplay.innerText = `SCORE: ${score}`;
            
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            
            isPlaying = true;
            
            setTimeout(spawnObstacle, 1000);
        }

        function gameOver() {
            isPlaying = false;
            finalScoreDisplay.innerText = score;
            gameOverScreen.classList.remove('hidden');
            
            // 실감나는 파손/넘어짐 물리 시뮬레이션 대용 액션 연출
            playerGroup.rotation.z = -Math.PI / 2.2;
            playerGroup.rotation.y = 0.4;
            playerGroup.position.y = 0.25;
            playerGroup.position.x += (currentLane === 0 ? 0.3 : -0.3);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // 애니메이션 렌더링 프레임 루프
        function animate() {
            requestAnimationFrame(animate);

            if (isPlaying) {
                // 1. 도로 점선 및 배경 무한스크롤 질주 효과
                roadLines.forEach(line => {
                    line.position.z += speed;
                    if (line.position.z > 6) {
                        line.position.z -= 100;
                    }
                });

                sceneryObjects.forEach(obj => {
                    obj.position.z += speed;
                    if(obj.position.z > 12) {
                        obj.position.z = -150;
                        obj.position.x = obj.position.x < 0 ? -(Math.random() * 12 + 6) : (Math.random() * 12 + 6);
                    }
                });

                // 2. 자전거 바퀴 실제 회전 애니메이션 (세워진 휠의 회전축은 X축!)
                frontWheelMesh.rotation.x -= speed / 0.55; 
                backWheelMesh.rotation.x -= speed / 0.55; 

                // 3. 페달 및 크랭크셋 완벽한 연동 회전 (픽시의 상징: 고정기어 페달링)
                crankGroup.rotation.x -= speed / 0.55;

                // 4. 부드러운 핸들 조작 느낌 (러프하게 움직이는 Lerp 보간)
                playerGroup.position.x += (targetX - playerGroup.position.x) * 0.16;
                
                // 차선을 바꿀때 자전거가 스포티하게 기우는 기울기(Lean angle)
                const rollLean = (playerGroup.position.x - targetX) * -0.16; 
                playerGroup.rotation.z += (rollLean - playerGroup.rotation.z) * 0.2;
                playerGroup.rotation.y = (playerGroup.position.x - targetX) * -0.06; // 진행방향으로 머리 살짝 틈
                
                // 5. 장애물 흐름 처리 및 무사통과시 점수 득점
                for (let i = obstacles.length - 1; i >= 0; i--) {
                    const obs = obstacles[i];
                    obs.position.z += speed;
                    
                    if (obs.position.z > 6) {
                        scene.remove(obs);
                        obstacles.splice(i, 1);
                        score += 10;
                        scoreDisplay.innerText = `SCORE: ${score}`;
                        
                        // 자연스럽게 최고속도로 가속
                        if (speed < MAX_SPEED) {
                            speed += 0.006;
                        }
                    }
                }

                // 6. 충돌 테스트 검사
                checkCollisions();
            } else {
                // 게임 비실행/대기중일 때는 가볍게 정지상태의 자전거가 공중에 둥둥 뜨는 심플 카메라 회전 처리
                if(playerGroup) {
                    playerGroup.position.x = 0;
                    playerGroup.rotation.y = Math.sin(Date.now() * 0.001) * 0.15;
                    crankGroup.rotation.x -= 0.01;
                    frontWheelMesh.rotation.x -= 0.01;
                    backWheelMesh.rotation.x -= 0.01;
                }
            }

            renderer.render(scene, camera);
        }

        // 빌드 시작
        init();
    </script>
</body>
</html>
